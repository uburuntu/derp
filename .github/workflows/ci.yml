name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  check:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: derp
          POSTGRES_PASSWORD: derp
          POSTGRES_DB: derp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U derp -d derp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://derp:derp@localhost:5432/derp_test
        run: bunx drizzle-kit migrate

      - name: Check database readiness
        env:
          DATABASE_URL: postgresql://derp:derp@localhost:5432/derp_test
        run: bun --eval 'import { getDb, assertDatabaseReady, closeDb } from "./src/db/connection"; const db = getDb(process.env.DATABASE_URL!); await assertDatabaseReady(db); await closeDb();'

      - name: Run checks
        run: bun run check
