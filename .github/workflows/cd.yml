name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if no changes'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Run CI checks first
  ci:
    uses: ./.github/workflows/ci.yml

  # Build and push Docker image
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # Deploy to production server
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          GITHUB_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: IMAGE,GITHUB_TOKEN
          command_timeout: 10m
          script: |
            set -e
            echo "=== Deployment starting ==="

            # Authenticate with GitHub Container Registry
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image FIRST (before stopping anything)
            echo "Pulling: $IMAGE"
            docker pull "$IMAGE"

            # Check if current container exists
            CURRENT_EXISTS=$(docker ps -a -q --filter "name=^derp-bot$" 2>/dev/null || echo "")

            if [ -n "$CURRENT_EXISTS" ]; then
              echo "=== Stopping current container ==="
              docker rm -f derp-bot-previous 2>/dev/null || true
              docker rename derp-bot derp-bot-previous 2>/dev/null || true
              docker stop derp-bot-previous --time 10 2>/dev/null || true

              # Verify stopped (critical for Telegram long-polling — no dual polling)
              for i in 1 2 3; do
                if docker ps -q --filter "name=derp-bot-previous" | grep -q .; then
                  echo "  Waiting for stop... ($i)"
                  sleep 2
                else
                  echo "  Previous container stopped"
                  break
                fi
              done
            fi

            # Run database migrations
            echo "=== Running database migrations ==="
            docker run --rm \
              --env-file /opt/derp/.env.prod \
              "$IMAGE" \
              bunx drizzle-kit push --force

            # Start new container
            echo "=== Starting new container ==="
            docker run -d \
              --name derp-bot \
              --restart unless-stopped \
              --env-file /opt/derp/.env.prod \
              -p 127.0.0.1:8080:8080 \
              "$IMAGE"

            # Application-level health check — wait for /health to return 200
            echo "=== Health check (waiting for healthy status) ==="
            HEALTHY=false
            for i in $(seq 1 12); do
              sleep 5
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/health 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  Check $i/12: HTTP $HTTP_CODE — healthy"
                HEALTHY=true
                break
              else
                echo "  Check $i/12: HTTP $HTTP_CODE — waiting..."
              fi
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "=== HEALTH CHECK FAILED — ROLLBACK ==="
              echo "Container logs:"
              docker logs derp-bot --tail 30 2>&1 || true

              docker stop derp-bot 2>/dev/null || true
              docker rm derp-bot 2>/dev/null || true

              if docker ps -a -q --filter "name=derp-bot-previous" | grep -q .; then
                docker rename derp-bot-previous derp-bot
                docker start derp-bot
                echo "Rolled back to previous version"
              fi
              exit 1
            fi

            # Show health response
            echo "=== Health status ==="
            curl -s http://127.0.0.1:8080/health | python3 -m json.tool 2>/dev/null || curl -s http://127.0.0.1:8080/health

            # Cleanup
            docker rm derp-bot-previous 2>/dev/null || true
            docker image prune -f

            echo "=== DEPLOY SUCCESS ==="

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Container ==="
            docker ps --filter "name=derp-bot" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
            echo ""
            echo "=== Health ==="
            curl -s http://127.0.0.1:8080/health
            echo ""
            echo ""
            echo "=== Recent Logs ==="
            docker logs derp-bot --tail 10 2>&1 || echo "No logs available"

      - name: Deployment summary
        run: |
          echo "### Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ needs.build.outputs.image_digest }}\`" >> $GITHUB_STEP_SUMMARY
