services:
  db:
    image: postgres:17
    container_name: derp-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: derp
      POSTGRES_PASSWORD: derp
      POSTGRES_DB: derp
    volumes:
      - derp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U derp -d derp"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  db-test:
    image: postgres:17
    container_name: derp-db-test
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: derp
      POSTGRES_PASSWORD: derp
      POSTGRES_DB: derp_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U derp -d derp_test"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    profiles:
      - test

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: derp-bot
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  derp-pgdata:
